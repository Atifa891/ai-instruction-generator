<!DOCTYPE html>
<html>
<head>
    <title>AI Instruction Generator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            width: 70%;
            margin: 50px auto;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
        }

        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .btn1 { background: #3498db; }
        .btn2 { background: #2ecc71; }
        .btn3 { background: #e74c3c; }
    </style>
</head>

<body>

<div class="container">

<h1>AI Instruction Dataset Generator</h1>

<hr>

<h2>1️⃣ Upload Dataset</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <br>
    <button class="btn1">Upload</button>
</form>

<hr>

<h2>2️⃣ Generate Instructions</h2>

<form action="/generate" method="post">
    <textarea name="prompt" placeholder="Write your prompt..." required></textarea>
    <br>
    <button class="btn2">Generate</button>
</form>

<hr>

<h2>3️⃣ Download Result</h2>

<a href="/download">
    <button class="btn3">Download JSON</button>
</a>

</div>

</body>
</html>
